          title: Left
        - name: top
          title: Top
      default: right

    - name: xAxisText
      title: ""
      type: String

    - name: xAxisFontSize
      title: Size
      type: List
      options:
        - name: "10"
          title: "10"
        - name: "12"
          title: "12"
        - name: "14"
          title: "14"
        - name: "16"
          title: "16"
        - name: "18"
          title: "18"
        - name: "20"
          title: "20"
      default: "16"

    - name: xAxisPosition
      title: Position
      type: List
      options:
        - name: "0"
          title: Left
        - name: "0.5"
          title: Center
        - name: "1"
          title: Right
      default: "0.5"

    - name: yAxisText
      title: ""
      type: String

    - name: yAxisFontSize
      title: Size
      type: List
      options:
        - name: "10"
          title: "10"
        - name: "12"
          title: "12"
        - name: "14"
          title: "14"
        - name: "16"
          title: "16"
        - name: "18"
          title: "18"
        - name: "20"
          title: "20"
      default: "16"

    - name: yAxisPosition
      title: Position
      type: List
      options:
        - name: "1"
          title: Top
        - name: "0.5"
          title: Center
        - name: "0"
          title: Bottom
      default: "0.5"

    - name: yAxisLabelFontSize
      title: Label font size
      type: Number
      default: 12

    - name: yAxisLabelRotation
      title: Label rotation
      type: Number
