---
name:  mrfrequencies
title: Frequencies
category: plots
menuGroup: vijPlots
menuSubgroup: Multiple Response
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data

    - name: mode
      title: ""
      type: List
      options:
            - name: morevar
              title: "Dummy Variables"
            - name: onevar
              title: "Multi-valued Variable"

    - name: repVar
      title: Multiple Value Variable
      type: Variable
      suggested:
        - nominal
      permitted:
        - factor

    - name: separator
      title: Separator
      type: String
      default: ';'

    - name: emptyAsNA
      title: Treat empty values as missing
      type: Bool
      default: true

    - name: resps
      title: Option Variables
      type: Variables
      suggested:
        - nominal
      permitted:
        - factor

    - name: endorsed
      title: Counted value
      type: Integer
      default: 1

    - name: optionname
      title: Option name
      type: String
      default: 'Options'

    - name: order
      title: Sorting
      type: List
      options:
        - title: Decreasing
          name:  decreasing
        - title: Increasing
          name:  increasing
        - title: None
          name:  none
      default: decreasing

    - name: showTotal
      title: Total
      type: Bool
      default: true

    - name: showCounts
      title: Counts
      type: Bool
      default: true

    - name: labelPosition
      title: Label Position
      type: List
      options:
        - title: Middle
          name:  middle
        - title: Top
          name:  top
      default: middle

    - name: showResponses
      title: "% of responses"
      type: Bool
      default: true

    - name: showCases
      title: "% of cases"
      type: Bool
      default: true

    - name: yaxis
      title: Y-Axis
      type: List
      options:
        - title: Counts
          name:  counts
        - title: '% of responses'
          name:  responses
        - title: '% of cases'
          name:  cases
      default: cases

    - name: horizontal
      title: Horizontal plot
      type: Bool
      default: false

    - name: showLabels
      title: Show count labels
      type: Bool
      default: false

    - name: accuracy
      title: "% Accuracy"
      type: List
      options:
        - title: "1"
          name:  "1"
        - title: "0.1"
          name:  "0.1"
        - title: "0.01"
          name: "0.01"
      default: "0.1"

    - name: labelFontSize
      type: Number
      title: Label
      min: 8
      max: 24
      default: 12

    - name: colorPalette
      title: Palette
      type: List
      options:
        - title: jmv Default
          name:  jmv
        - title: Set 1
          name:  Set1
        - title: Set 2
          name:  Set2
        - title: Set 3
          name:  Set3
        - title: Pastel 1
          name:  Pastel1
        - title: Pastel 2
          name:  Pastel2
        - title: Accent
          name:  Accent
        - title: Paired
          name:  Paired
        - title: Dark 2
          name:  Dark2
        - title: Spectral
          name:  Spectral
        - title: Red, Yellow, Green
          name:  RdYlGn
        - title: Red, Yellow, Blue
          name:  RdYlBu
        - title: Red and Gray
          name:  RdGy
        - title: Red and Blue
          name:  RdBu
        - title: Orange and Purple
          name:  PuOr
        - title: Purple and Green
          name:  PRGn
        - title: Pink and Green
          name:  PiYG
        - title: Brown and Green
          name:  BrBG
        - title: Blues
          name:  Blues
        - title: Greens
          name:  Greens
        - title: Greys
          name:  Greys
        - title: Oranges
          name:  Oranges
        - title: Purples
          name:  Purples
        - title: Reds
          name:  Reds
        - title: Blue to Green
          name:  BuGn
        - title: Blue to Purple
          name:  BuPu
        - title: Green to Blue
          name:  GnBu
        - title: Orange to Red
          name:  OrRd
        - title: Purple to Blue
          name:  PuBu
        - title: Purple to Green
          name:  PuBuGn
        - title: Purple to Red
          name:  PuRd
        - title: Red to Purple
          name:  RdPu
        - title: Yellow to Green
          name:  YlGn
        - title: Yellow to Blue
          name:  YlGnBu
        - title: Yellow to Brown
          name:  YlOrBr
        - title: Yellow to Red
          name:  YlOrRd
        - title: Viridis:Viridis
          name: viridis::viridis
        - title: Viridis:Magma
          name: viridis::magma
        - title: Viridis:Inferno
          name: viridis::inferno
        - title: Viridis:Plasma
          name: viridis::plasma
        - title: Viridis:Turbo
          name: viridis::turbo
        - title: Dichromat:Categorical
          name: dichromat::Categorical.12
        - title: Tidy:Friendly
          name: tidy::friendly
        - title: Tidy:Seaside
          name: tidy::seaside
        - title: Tidy:Apple
          name: tidy::apple
        - title: Tidy:Ibm
          name: tidy::ibm
        - title: Tidy:Candy
          name: tidy::candy
        - title: Tidy:Alger
          name: tidy::alger
        - title: Tidy:Rainbow
          name: tidy::rainbow
        - title: Tidy:Metro
          name: tidy::metro
        - title: Lémovice
          name: custom::lemovice
      default: jmv

    - name: singleColor
      title: Use color No.
      type: Bool
      default: true

    - name: colorNo
      type: Integer
      title: Color Number
      min: 1
      max: 255
      default: 1

    - name: borderColor
      title: Border
      type: List
      options:
        - title: None
          name:  none
        - title: Black
          name:  black
        - title: White
          name:  white
        - title: Gray
          name:  gray
      default: none

    - name: textColor
      title: Label
      type: List
      options:
        - title: Black
          name:  black
        - title: White
          name:  white
        - title: Auto
          name:  auto
      default: auto

    - name: titleText
      title: ""
      type: String

    - name: titleFontFace
      title: Font
      type: List
      options:
        - name: plain
          title: Normal
        - name: bold
          title: Bold
        - name: italic
          title: Italic
        - name: bold.italic
          title: Bold Italic
      default: bold

    - name: titleFontSize
      title: ""
      type: List
      options:
        - name: "12"
          title: "12"
        - name: "14"
          title: "14"
        - name: "16"
          title: "16"
        - name: "18"
          title: "18"
        - name: "20"
